        .zone-item {
            background: var(--gradient-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .zone-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .zone-item:hover::before {
            opacity: 1;
        }

        .zone-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary-light);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }

        .zone-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--border-light);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item:hover img {
            transform: scale(1.05);

            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .zone-item:hover button {
            color: var(--primary);
            background: rgba(252, 38, 81, 0.05);
        }

        .zone-item-crab {
            background: var(--gradient-surface-crab);
            border: 1px solid var(--border-crab);
            border-radius: var(--radius-lg-crab);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .zone-item-crab:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-crab);
        }

        .zone-item-crab:hover::before {
            opacity: 1;
        }

        .zone-item-crab::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary-light-crab);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }

        .zone-item-crab img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--border-light-crab);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item-crab:hover img {
            transform: scale(1.05);
        }

        .zone-item-crab button {
            background: transparent;
            color: var(--text-crab);
            border: 0;
            padding: 1.25rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            line-height: 1.4;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .zone-item-crab:hover button {
            color: var(--primary-crab);
            background: rgba(252, 38, 81, 0.05);
        }

        #zoneViewer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .zone-header {
            background: var(--gradient-primary);
            color: white;
            padding: 0.4rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-lg);
        }

        .zone-title {
            flex: 1;
            min-width: 0;
        }

        #zoneName {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 0.25rem;
            line-height: 1.3;
        }

        #zoneId {
            display: none;
        }

        #zoneAuthor {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        #zoneAuthor:hover {
            color: white;
            text-decoration: underline;
        }

        .zone-controls {
            display: flex;
            gap: 0.75rem;
        }

        .zone-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.625rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        .zone-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        #zoneFrame {
            flex-grow: 1;
            border: none;
            width: 90%;
            height: 90%;
        }

        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .popup {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            animation: slideInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInScale {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .popup-header {
            background: var(--gradient-primary);
            color: white;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #popupTitle {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

            border: 0;
            color: white;
            font-size: 1.25rem;

            padding: 0.5rem;

<body class="theme-crab">

    <script>
        const container = document.getElementById('container');
        const zoneViewer = document.getElementById('zoneViewer');
        let zoneFrame = document.getElementById('zoneFrame');
        const searchBar = document.getElementById('searchBar');
        const sortOptions = document.getElementById('sortOptions');
        const filterOptions = document.getElementById('filterOptions');
        // https://www.jsdelivr.com/tools/purge
        const zonesurls = [
            "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
            "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
            "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
            "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
        ];
        let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
        const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";

        let crabZonesURL = "https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@main/zones.json";
        const crabCoverURL = "https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@main/covers";
        const crabHtmlURL = "https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@main/html";

        let zones = [];
        let popularityData = {};
        const featuredContainer = document.getElementById('featuredZones');

        function toTitleCase(str) {
            return str.replace(
                /\w\S*/g,
                text => text.charAt(0).toUpperCase() + text.substring(1).toLowerCase()
            );
        }
        async function listZones() {
            try {

                // sha
                let sharesponse;
                let shajson;
                let sha;
                let crabsharesponse;
                let crabshajson;
                let crabsha;
                try {
                    sharesponse = await fetch(
                        "https://api.github.com/repos/%67%6e%2d%6d%61%74%68/assets/commits?t=" + Date.now());
                    crabsharesponse = await fetch(
                        "https://api.github.com/repos/SirCrabapple99/crab-assets/commits?t=" + Date.now());
                    // console.log(crabsharesponse)
                } catch (error) { }

                if (sharesponse && sharesponse.status === 200) {
                    try {
                        shajson = await sharesponse.json();
                        sha = shajson[0]['sha'];
                        if (sha) {
                            zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                        }
                    } catch (error) { }
                }

                if (crabsharesponse && crabsharesponse.status === 200) {
                    // console.log('crabshaerror')
                    try {
                        crabshajson = await crabsharesponse.json();
                        crabsha = crabshajson[0]['sha'];
                        if (crabsha) {
                            crabZonesURL =
                                `https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@${crabsha}/zones.json`;
                            crabHtmlURL = `https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@${crabsha}/html`;
                            crabCoverURL =
                                `https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets@${crabsha}/covers`;
                            //  console.log(crabZonesURL)
                        }
                    } catch (error) {
                        //  console.log('crabshacooked')
                    }
                }

                // gn games
                const response = await fetch(zonesURL + "?t=" + Date.now());
                const json = await response.json();
                const crabresponse = await fetch(crabZonesURL + "?t=" + Date.now());
                const crabjson = await crabresponse.json();
                zones = [...json, ...crabjson];
                zones[0].featured = true; // always gonna be the discord
                await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"),
                fetchPopularity("day")
                ]);
                sortZones();
                try {
                    const search = new URLSearchParams(window.location.search);
                    const id = search.get('id');
                    const embed = window.location.hash.includes("embed");
                    if (id) {
                        const zone = zones.find(zone => zone.id + '' == id + '');
                        if (zone) {
                            if (embed) {
                                if (zone.url.startsWith("http")) {
                                    window.open(zone.url, "_blank");
                                } else {

                                    const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}",
                                        htmlURL).replace("{CRAB_COVER_URL}", crabCoverURL).replace(
                                            "{CRAB_HTML_URL}", crabHtmlURL);
                                    fetch(url + "?t=" + Date.now()).then(response => response.text()).then(html => {
                                        document.documentElement.innerHTML = html;
                                        const popup = document.createElement("div");
                                        popup.style.position = "fixed";
                                        popup.style.bottom = "20px";
                                        popup.style.right = "20px";
                                        popup.style.backgroundColor = "#cce5ff";
                                        popup.style.color = "#004085";
                                        popup.style.padding = "10px";
                                        popup.style.border = "1px solid #b8daff";
                                        popup.style.borderRadius = "5px";
                                        popup.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.1)";
                                        popup.style.fontFamily = "Arial, sans-serif";

                                        popup.innerHTML =
                                            `Play more games at <a class='link' href="https://gn-math.dev" target="_blank" style="color:#004085; font-weight:bold;">https://gn-math.dev</a>!`;

                                        const closeBtn = document.createElement("button");
                                        closeBtn.innerText = "?";
                                        closeBtn.style.marginLeft = "10px";
                                        closeBtn.style.background = "none";
                                        closeBtn.style.border = "none";
                                        closeBtn.style.cursor = "pointer";
                                        closeBtn.style.color = "#004085";
                                        closeBtn.style.fontWeight = "bold";

                                        closeBtn.onclick = () => popup.remove();
                                        popup.appendChild(closeBtn);
                                        document.body.appendChild(popup);
                                        document.documentElement.querySelectorAll('script').forEach(
                                            oldScript => {
                                                const newScript = document.createElement('script');
                                                if (oldScript.src) {
                                                    newScript.src = oldScript.src;
                                                } else {
                                                    newScript.textContent = oldScript.textContent;
                                                }
                                                document.body.appendChild(newScript);
                                            });
                                    }).catch(error => alert("Failed to load zone: " + error));
                                }
                            } else {
                                openZone(zone);
                            }
                        }
                    }
                } catch (error) { }
                let alltags = [];
                for (const obj of json) {
                    if (Array.isArray(obj.special)) {
                        alltags.push(...obj.special);
                    }
                }

                alltags = [...new Set(alltags)];
                let filteroption = document.getElementById("filterOptions");
                if (filteroption && filteroption.children.length > 1) {
                    while (filteroption.children.length > 1) {
                        filteroption.removeChild(filteroption.lastElementChild);
                    }
                }
                for (const tag of alltags) {
                    const opt = document.createElement("option");
                    opt.value = tag;
                    opt.textContent = toTitleCase(tag);
                    filteroption.appendChild(opt);
                }

            } catch (error) {
                console.error(error);
            }
        }

        async function fetchPopularity(duration) {
            try {
                if (!popularityData[duration]) {
                    popularityData[duration] = {};
                }
                const response = await fetch(
                    "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" +
                    duration
                );
                const data = await response.json();
                data.forEach(file => {
                    const idMatch = file.name.match(/\/(\d+)\.html$/);
                    if (idMatch) {
                        const id = parseInt(idMatch[1]);
                        popularityData[duration][id] = file.hits?.total ?? 0;
                    }
                });
            } catch (error) {
                if (!popularityData[duration]) {
                    popularityData[duration] = {};
                }
                popularityData[duration][0] = 0;
            }
        }


        function sortZones() {
            const sortBy = sortOptions.value;
            if (sortBy === 'name') {
                zones.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'id') {
                zones.sort((a, b) => a.id - b.id);
            } else if (sortBy === 'popular') {
                zones.sort((a, b) => ((popularityData['year']?.[b.id]) ?? 0) - ((popularityData['year']?.[a.id]) ?? 0));
            } else if (sortBy === 'trendingMonth') {
                zones.sort((a, b) => ((popularityData['month']?.[b.id]) ?? 0) - ((popularityData['month']?.[a.id]) ??
                    0));
            } else if (sortBy === 'trendingWeek') {
                zones.sort((a, b) => ((popularityData['week']?.[b.id]) ?? 0) - ((popularityData['week']?.[a.id]) ?? 0));
            } else if (sortBy === 'trendingDay') {
                zones.sort((a, b) => ((popularityData['day']?.[b.id]) ?? 0) - ((popularityData['day']?.[a.id]) ?? 0));
            }
            zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
            startupFavorites();
            if (featuredContainer.innerHTML === "") {
                const featured = zones.filter(z => z.featured);
                displayFeaturedZones(featured);
            }
            displayZones(zones);
        }

        function displayFeaturedZones(featuredZones) {
            featuredContainer.innerHTML = "";
            featuredZones.forEach((file, index) => {
                const zoneItem = document.createElement("div");
                zoneItem.className = "zone-item";
                // highlight blue
                if (file.id >= 99000) {
                    zoneItem.className = "zone-item zone-item-crab";
                }
                zoneItem.onclick = () => openZone(file);

                const favoriteButton = document.createElement("div");
                favoriteButton.classList = 'favorite-button';
                favoriteButton.textContent = '★';
                favoriteButton.onclick = (event) => {
                    console.log(file.name)
                    event.stopPropagation()
                    toggleFavorite(favoriteButton, file)
                };
                if (zoneFavorites.some(fav => fav && fav.name === file.name)) {
                    favoriteButton.className = 'favorite-button starred'
                }
                favoriteButton.setAttribute('data-zone-name', file.name);
                zoneItem.appendChild(favoriteButton);

                const img = document.createElement("img");
                img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL)
                    .replace("{CRAB_COVER_URL}", crabCoverURL).replace("{CRAB_HTML_URL}", crabHtmlURL);
                img.alt = file.name;
                img.loading = "lazy";
                img.className = "lazy-zone-img";
                zoneItem.appendChild(img);
                const button = document.createElement("button");
                button.textContent = file.name;
                button.onclick = (event) => {
                    event.stopPropagation();
                    openZone(file);
                };
                zoneItem.appendChild(button);
                featuredContainer.appendChild(zoneItem);
            });
            if (featuredContainer.innerHTML === "") {
                featuredContainer.innerHTML = "No featured zones found.";
            } else {
                document.getElementById("allZonesSummary").textContent = `Featured Zones (${featuredZones.length})`;
            }

            const lazyImages = document.querySelectorAll('#featuredZones img.lazy-zone-img');
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !zoneViewer.hidden) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        observer.unobserve(img);
                    }
                });
            }, {
                rootMargin: "100px",
                threshold: 0.1
            });

            lazyImages.forEach(img => {
                imageObserver.observe(img);
            });
        }

        function displayZones(zones) {
            container.innerHTML = "";
            zones.forEach((file, index) => {
                const zoneItem = document.createElement("div");
                zoneItem.className = "zone-item";
                // highlight blue
                if (file.id >= 99000) {
                    zoneItem.className = "zone-item zone-item-crab";
                }

                const favoriteButton = document.createElement("div");
                favoriteButton.classList = 'favorite-button';
                favoriteButton.textContent = '★';
                favoriteButton.id = 'favorite-' + file.id;
                favoriteButton.onclick = (event) => {
                    console.log(file.name)
                    event.stopPropagation()
                    toggleFavorite(favoriteButton, file)
                };
                if (zoneFavorites.some(fav => fav && fav.name === file.name)) {
                    favoriteButton.className = 'favorite-button starred'
                }
                zoneItem.appendChild(favoriteButton);
                favoriteButton.setAttribute('data-zone-name', file.name);

                zoneItem.onclick = () => openZone(file);
                const img = document.createElement("img");
                img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL)
                    .replace("{CRAB_COVER_URL}", crabCoverURL).replace("{CRAB_HTML_URL}", crabHtmlURL);
                img.alt = file.name;
                img.loading = "lazy";
                img.className = "lazy-zone-img";
                zoneItem.appendChild(img);

                const button = document.createElement("button");
                button.textContent = file.name;
                button.onclick = (event) => {
                    event.stopPropagation();
                    openZone(file);
                };

                zoneItem.appendChild(button);
                container.appendChild(zoneItem);

            });
            if (container.innerHTML === "") {
                container.innerHTML = "No zones found.";
            } else {
                document.getElementById("allSummary").textContent = `All Zones (${zones.length})`;
            }

            const lazyImages = document.querySelectorAll('img.lazy-zone-img');
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !zoneViewer.hidden) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        observer.unobserve(img);
                    }
                });
            }, {
                rootMargin: "100px",
                threshold: 0.1
            });

            lazyImages.forEach(img => {
                imageObserver.observe(img);
            });
        }

        function filterZones2() {
            const query = filterOptions.value;
            if (query === "none") {
                displayZones(zones);
            } else {
                const filteredZones = zones.filter(zone => zone.special?.includes(query));
                if (query.length !== 0) {
                    document.getElementById("featuredZonesWrapper").removeAttribute("open");
                }
                displayZones(filteredZones);
            }
        }

        function filterZones() {
            const query = searchBar.value.toLowerCase();
            const filteredZones = zones.filter(zone => zone.name.toLowerCase().includes(query));
            if (query.length !== 0) {
                document.getElementById("featuredZonesWrapper").removeAttribute("open");
            }
            displayZones(filteredZones);

        function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
            if (typeof obj === 'string') {
                return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
            }

            if (obj instanceof Uint8Array) {
                if (obj.length > maxArrayLen) {
                    return `[Uint8Array too large (${obj.length} bytes), truncated]`;
                }
                return obj;
            }

            if (Array.isArray(obj)) {
                return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
            }

            if (obj && typeof obj === 'object') {
                const newObj = {};
                for (const key in obj) {
                    if (obj.hasOwnProperty(key)) {
                        newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen);
                    }
                }
                return newObj;
            }

            return obj;
        }

        async function saveData() {
            alert("This might take a while, dont touch anything other than this OK button");
            const result = {};
            result.cookies = document.cookie;
            result.localStorage = {
                ...localStorage
            };
            result.sessionStorage = {
                ...sessionStorage
            };
            result.indexedDB = {};
            const dbs = await indexedDB.databases();
            for (const dbInfo of dbs) {
                if (!dbInfo.name) continue;
                result.indexedDB[dbInfo.name] = {};
                await new Promise((resolve, reject) => {
                    const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
                    openRequest.onerror = () => reject(openRequest.error);
                    openRequest.onsuccess = () => {
                        const db = openRequest.result;
                        const storeNames = Array.from(db.objectStoreNames);
                        if (storeNames.length === 0) {
                            resolve();
                            return;
                        }
                        const transaction = db.transaction(storeNames, "readonly");
                        const storePromises = [];
                        for (const storeName of storeNames) {
                            result.indexedDB[dbInfo.name][storeName] = [];
                            const store = transaction.objectStore(storeName);
                            const getAllRequest = store.getAll();
                            const p = new Promise((res, rej) => {
                                getAllRequest.onsuccess = () => {
                                    result.indexedDB[dbInfo.name][storeName] = sanitizeData(
                                        getAllRequest.result, 1000, 100);
                                    res();
                                };
                                getAllRequest.onerror = () => rej(getAllRequest.error);
                            });
                            storePromises.push(p);
                        }
                        Promise.all(storePromises).then(() => resolve());
                    };
                });
            }

            result.caches = {};
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
                const cache = await caches.open(cacheName);
                const requests = await cache.keys();
                result.caches[cacheName] = [];
                for (const req of requests) {
                    const response = await cache.match(req);
                    if (!response) continue;
                    const cloned = response.clone();
                    const contentType = cloned.headers.get('content-type') || '';
                    let body;
                    try {
                        if (contentType.includes('application/json')) {
                            body = await cloned.json();
                        } else if (contentType.includes('text') || contentType.includes('javascript')) {
                            body = await cloned.text();
                        } else {
                            const buffer = await cloned.arrayBuffer();
                            body = btoa(String.fromCharCode(...new Uint8Array(buffer)));
                        }
                    } catch (e) {
                        body = '[Unable to read body]';
                    }
                    result.caches[cacheName].push({
                        url: req.url,
                        body,
                        contentType
                    });
                }
            }

            alert("Done, wait for the download to come");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], {
                type: "application/octet-stream"
            }));
            link.download = `${Date.now()}.data`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function (e) {
                const data = JSON.parse(e.target.result);
                if (data.cookies) {
                    data.cookies.split(';').forEach(cookie => {
                        document.cookie = cookie.trim();
                    });
                }

                if (data.localStorage) {
                    for (const key in data.localStorage) {
                        localStorage.setItem(key, data.localStorage[key]);
                    }
                }

                if (data.sessionStorage) {
                    for (const key in data.sessionStorage) {
                        sessionStorage.setItem(key, data.sessionStorage[key]);
                    }
                }

                if (data.indexedDB) {
                    for (const dbName in data.indexedDB) {
                        const stores = data.indexedDB[dbName];
                        await new Promise((resolve, reject) => {
                            const request = indexedDB.open(dbName, 1);
                            request.onupgradeneeded = e => {
                                const db = e.target.result;
                                for (const storeName in stores) {
                                    if (!db.objectStoreNames.contains(storeName)) {
                                        db.createObjectStore(storeName, {
                                            keyPath: 'id',
                                            autoIncrement: true
                                        });
                                    }
                                }
                            };
                            request.onsuccess = e => {
                                const db = e.target.result;
                                const transaction = db.transaction(Object.keys(stores),
                                    'readwrite');
                                transaction.onerror = () => reject(transaction.error);
                                let pendingStores = Object.keys(stores).length;

                                for (const storeName in stores) {
                                    const objectStore = transaction.objectStore(storeName);
                                    objectStore.clear().onsuccess = () => {
                                        for (const item of stores[storeName]) {
                                            objectStore.put(item);
                                        }
                                        pendingStores--;
                                        if (pendingStores === 0) resolve();
                                    };
                                }
                            };
                            request.onerror = () => reject(request.error);
                        });
                    }
                }

                if (data.caches) {
                    for (const cacheName in data.caches) {
                        const cache = await caches.open(cacheName);
                        await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(
                            k)))); // clear existing

                        for (const entry of data.caches[cacheName]) {
                            let responseBody;
                            if (entry.contentType.includes('application/json')) {
                                responseBody = JSON.stringify(entry.body);
                            } else if (entry.contentType.includes('text') || entry.contentType.includes(
                                'javascript')) {
                                responseBody = entry.body;
                            } else {
                                const binaryStr = atob(entry.body);
                                const len = binaryStr.length;
                                const bytes = new Uint8Array(len);
                                for (let i = 0; i < len; i++) {
                                    bytes[i] = binaryStr.charCodeAt(i);
                                }
                                responseBody = bytes.buffer;
                            }
                            const headers = new Headers({
                                'content-type': entry.contentType
                            });
                            const response = new Response(responseBody, {
                                headers
                            });
                            await cache.put(entry.url, response);
                        }
                    }
                }
                alert("Data loaded");
            };
            alert("This might take a while, dont touch anything other than this OK button");
            reader.readAsText(file);
        }

        let _allStatsCache = null;

        async function getAllStats() {
            if (_allStatsCache) {
                return _allStatsCache;
            }

            const BASE_URL =
                "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files";
            const PERIOD = "year";
            const PAGE_BATCH = 5;

            let page = 1;
            let done = false;
            const combinedMap = Object.create(null);

            while (!done) {
                const pages = Array.from({
                    length: PAGE_BATCH
                }, (_, i) => page + i);

                const responses = await Promise.all(
                    pages.map(p =>
                        fetch(`${BASE_URL}?period=${PERIOD}&page=${p}&limit=100`)
                            .then(r => (r.ok ? r.json() : []))
                    )
                );

                for (const data of responses) {
                    if (!Array.isArray(data) || data.length === 0) {
                        done = true;
                        break;
                    }

                    for (const item of data) {
                        if (!item?.name) continue;

                        const match = item.name.match(/^\/(\d+)([.-])/);
                        if (!match) continue;

                        const id = match[1];

                        if (!combinedMap[id]) {
                            combinedMap[id] = {
                                hits: 0,
                                bandwidth: 0
                            };
                        }

                        combinedMap[id].hits += item.hits?.total ?? 0;
                        combinedMap[id].bandwidth += item.bandwidth?.total ?? 0;
                    }
                }

                page += PAGE_BATCH;
            }

            _allStatsCache = combinedMap;
            return combinedMap;
        }

        async function getStats(id) {
            id = String(id);
            const allStats = await getAllStats();

            return allStats[id]?.hits ?? 0;
        }

        zoneFavorites = []
        const favoriteZones = document.getElementById('favoriteZones');

        function toggleFavorite(e = 'none', file) {

            const index = zoneFavorites.findIndex(z => z.name === file.name);
            let isFav = false
            if (index !== -1) {
                zoneFavorites.splice(index, 1);
            } else {
                zoneFavorites.push(file);
                isFav = true
            }

            const zoneStars = document.querySelectorAll(`[data-zone-name="${file.name}"]`);
            zoneStars.forEach(star => {
                if (isFav) {
                    star.classList.add('starred');
                } else {
                    star.classList.remove('starred');
                }
            });

            localStorage.setItem('gn-math-crab-favorites', JSON.stringify(zoneFavorites))
            sendFavoriteZones()
        }

        function sendFavoriteZones() {
            // console.log(zoneFavorites)
            favoriteZones.innerHTML = "";
            zoneFavorites.forEach((file, index) => {
                const zoneItem = document.createElement("div");
                zoneItem.className = "zone-item";
                // highlight blue
                if (file.id >= 99000) {
                    zoneItem.className = "zone-item zone-item-crab";
                }

                const favoriteButton = document.createElement("div");
                favoriteButton.className = 'favorite-button starred';
                favoriteButton.textContent = '★';
                favoriteButton.onclick = (event) => {
                    event.stopPropagation()
                    toggleFavorite(favoriteButton, file)
                };
                zoneItem.appendChild(favoriteButton);
                favoriteButton.setAttribute('data-zone-name', file.name);

                zoneItem.onclick = () => openZone(file);
                const img = document.createElement("img");
                img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL)
                    .replace("{CRAB_COVER_URL}", crabCoverURL).replace("{CRAB_HTML_URL}", crabHtmlURL);
                img.alt = file.name;
                img.loading = "lazy";
                img.className = "lazy-zone-img";
                zoneItem.appendChild(img);

                const button = document.createElement("button");
                button.textContent = file.name;
                button.onclick = (event) => {
                    event.stopPropagation();
                    openZone(file);
                };

                zoneItem.appendChild(button);
                favoriteZones.appendChild(zoneItem);
            });

            if (favoriteZones.innerHTML === "") {
                favoriteZones.innerHTML = "No favorite zones.";
            }

            const lazyImages = document.querySelectorAll('img.lazy-zone-img');
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !zoneViewer.hidden) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        observer.unobserve(img);
                    }
                });
            }, {
                rootMargin: "100px",
                threshold: 0.1
            });

            lazyImages.forEach(img => {
                imageObserver.observe(img);
            });
        }

        // load favorites on startup
        function startupFavorites() {
            const stored = localStorage.getItem('gn-math-crab-favorites');
            if (stored) {
                try {
                    zoneFavorites = JSON.parse(stored);
                    if (!Array.isArray(zoneFavorites)) zoneFavorites = [];
                } catch (e) {
                    zoneFavorites = [];
                }
            }
            sendFavoriteZones()
        }

        // themes
        let theme = 'theme-crab';

        if (localStorage.getItem('gn-math-crab-theme')) {
            theme = localStorage.getItem('gn-math-crab-theme')
        } else {
            localStorage.setItem('gn-math-crab-theme', 'theme-crab')
        }
        document.body.className = theme

        function themeOptions() {
            theme = document.getElementById("themeOptions").value
            localStorage.setItem('gn-math-crab-theme', theme)
            if (document.body.className.includes(' light')) {
                document.body.className = theme + ' light'
            } else {
                document.body.className = theme
            }
        }

        function toggleDark() {
            if (document.body.className.includes('-light')) {
                theme = document.body.className.replace('-light', '')
            } else {
                theme += '-light'
            }
            localStorage.setItem('gn-math-crab-theme', theme)
            document.body.className = theme
        }
    </script>
    <script>
        navigator.serviceWorker.register(location.protocol + '//' + location.hostname + '/sw.js')
    </script>
